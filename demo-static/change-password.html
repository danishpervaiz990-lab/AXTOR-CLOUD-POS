<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Change Password · Axtor POS Cloud</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="css/style.css?v=20260712-global-saas1" rel="stylesheet"><style>body{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,rgba(78,227,180,.25),transparent 34%),#f4fbf8;padding:20px}.password-card{width:min(480px,100%);background:#fff;border-radius:26px;padding:32px;box-shadow:0 24px 70px rgba(15,70,55,.14)}.brand-mark{margin:auto}</style></head><body><main class="password-card"><div class="brand-mark">A</div><h1 class="h3 text-center mt-3">Set a secure password</h1><p class="text-muted text-center">The temporary password must be changed before continuing. Other active sessions will be revoked.</p><div id="message" class="alert alert-info">Use at least 12 characters with uppercase, lowercase, a number and a symbol.</div><form id="passwordForm"><div class="mb-3"><label class="form-label">Current temporary password</label><input class="form-control" name="currentPassword" type="password" autocomplete="current-password" required></div><div class="mb-3"><label class="form-label">New password</label><input class="form-control" name="newPassword" type="password" autocomplete="new-password" minlength="12" required></div><div class="mb-3"><label class="form-label">Confirm new password</label><input class="form-control" name="confirmPassword" type="password" autocomplete="new-password" minlength="12" required></div><button class="btn btn-brand w-100" type="submit">Change password and continue</button></form></main><script src="js/axtor-api.js?v=20260712-global-saas1"></script><script>(function(){const form=document.querySelector('#passwordForm'),message=document.querySelector('#message');form.addEventListener('submit',async function(event){event.preventDefault();const data=new FormData(form),currentPassword=String(data.get('currentPassword')||''),newPassword=String(data.get('newPassword')||''),confirmPassword=String(data.get('confirmPassword')||'');if(newPassword!==confirmPassword){message.className='alert alert-danger';message.textContent='New password and confirmation do not match.';return}const button=form.querySelector('button');button.disabled=true;try{await AxtorAPI.apiPost('/api/v1/auth/change-password',{currentPassword,newPassword});message.className='alert alert-success';message.textContent='Password changed successfully.';const next=sessionStorage.getItem('axtorPasswordChangeReturn')||'setup.html';sessionStorage.removeItem('axtorPasswordChangeReturn');setTimeout(()=>location.href=next,500)}catch(error){message.className='alert alert-danger';message.textContent=error.message||'Password could not be changed.'}finally{button.disabled=false}})})();</script></body></html>
